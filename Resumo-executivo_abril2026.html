    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

x; color: rgba(255,255,255,0.86); max-width: 70ch; }\n\n  .num { font-variant-numeric: tabular-nums; }\n\n  .container { max-width: 1320px; margin: 0 auto; padding: 0 56px; }\n\n  /* ========== HERO ========== */\n  .hero {\n    position: relative;\n    overflow: hidden;\n    padding: 72px 0 96px;\n    background:\n      radial-gradient(1200px 600px at 80% 0%, rgba(0,174,239,0.18), transparent 60%),\n      radial-gradient(900px 500px at 10% 90%, rgba(232,201,123,0.12), transparent 60%),\n      linear-gradient(180deg, #1D1E46 0%, #252660 100%);\n    border-bottom: 1px solid var(--border-soft);\n  }\n  .hero-grid {\n    display: grid;\n    grid-template-columns: 1.2fr 1fr;\n    gap: 72px;\n    align-items: start;\n  }\n  .hero-right {\n    display: flex;\n    flex-direction: column;\n    align-items: flex-end;\n    gap: 32px;\n  }\n  .hero-mark {\n    display: flex;\n    justify-content: flex-end;\n  }\n  .hero-mark img.logo-img {\n    height: 110px;\n    width: auto;\n    display: block;\n    filter: drop-shadow(0 12px 40px rgba(0,174,239,0.25));\n  }\n  .hero h1 { margin: 14px 0 24px; }\n  .hero h1 em { font-style: normal; color: var(--gold); }\n  .hero p.lead { color: rgba(255,255,255,0.72); }\n\n  .hero-stat {\n    background: rgba(255,255,255,0.04);\n    border: 1px solid var(--border);\n    border-radius: 24px;\n    padding: 36px 32px;\n    backdrop-filter: blur(12px);\n  }\n  .hero-stat .row {\n    display: flex; justify-content: space-between; align-items: baseline;\n    padding: 18px 0;\n    border-bottom: 1px solid rgba(255,255,255,0.08);\n  }\n  .hero-stat .row:last-child { border-bottom: none; }\n  .hero-stat .row .label { color: rgba(255,255,255,0.6); font-size: 13px; }\n  .hero-stat .row .value { font-weight: 700; font-size: 22px; }\n  .hero-stat .row .value.big { font-size: 30px; color: var(--azul-claro); }\n  .hero-stat .row .value.gold { color: var(--gold); }\n\n  .hero-meta {\n    display: flex;\n    gap: 32px;\n    margin-top: 56px;\n    padding-top: 32px;\n    border-top: 1px solid rgba(255,255,255,0.1);\n    flex-wrap: wrap;\n  }\n  .hero-meta .item {\n    font-size: 12px;\n    color: rgba(255,255,255,0.5);\n    letter-spacing: 0.06em;\n  }\n  .hero-meta .item strong {\n    display: block; color: var(--branco); font-size: 14px; letter-spacing: 0; margin-top: 4px; font-weight: 600;\n  }\n\n  /* ========== SECTIONS ========== */\n  section.report {\n    padding: 96px 0;\n    border-bottom: 1px solid var(--border-soft);\n  }\n  section.report.alt {\n    background: linear-gradient(180deg, #1A1B40 0%, #1D1E46 100%);\n  }\n  .sec-head {\n    display: flex; align-items: flex-end; justify-content: space-between;\n    gap: 40px;\n    margin-bottom: 56px;\n  }\n  .sec-head .left { max-width: 720px; }\n  .sec-head h2 { margin-top: 12px; }\n  .sec-head .num-badge {\n    font-size: 13px;\n    color: var(--azul-claro);\n    font-weight: 700;\n    letter-spacing: 0.1em;\n  }\n  .sec-head p { margin-top: 16px; }\n\n  /* ========== KPI CARDS ========== */\n  .kpi-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px;\n  }\n  .kpi {\n    background: rgba(255,255,255,0.03);\n    border: 1px solid var(--border-soft);\n    border-radius: 18px;\n    padding: 24px;\n    position: relative;\n    overflow: hidden;\n  }\n  .kpi.feature {\n    background: linear-gradient(135deg, rgba(0,174,239,0.16), rgba(0,174,239,0.04));\n    border-color: var(--border);\n  }\n  .kpi.gold {\n    background: linear-gradient(135deg, rgba(232,201,123,0.18), rgba(232,201,123,0.04));\n    border-color: rgba(232,201,123,0.3);\n  }\n  .kpi .label {\n    font-size: 11px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.55);\n    font-weight: 600;\n  }\n  .kpi .value {\n    font-size: 36px;\n    font-weight: 800;\n    margin-top: 12px;\n    letter-spacing: -0.02em;\n  }\n  .kpi .value .pre { font-size: 18px; color: rgba(255,255,255,0.5); font-weight: 500; margin-right: 4px; }\n  .kpi .delta {\n    margin-top: 10px;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    padding: 4px 10px;\n    border-radius: 999px;\n    font-size: 12px;\n    font-weight: 600;\n  }\n  .kpi .delta.pos { background: rgba(34,197,94,0.15); color: var(--verde); }\n  .kpi .delta.neg { background: rgba(242,116,102,0.15); color: var(--coral); }\n  .kpi .delta.neutral { background: rgba(0,174,239,0.15); color: var(--azul-claro); }\n  .kpi .sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 10px; }\n\n  /* ========== CHART CARD ========== */\n  .card {\n    background: rgba(255,255,255,0.03);\n    border: 1px solid var(--border-soft);\n    border-radius: 22px;\n    padding: 32px;\n    position: relative;\n  }\n  .card.feature {\n    background: linear-gradient(180deg, rgba(0,174,239,0.06), rgba(0,174,239,0.02));\n    border-color: var(--border);\n  }\n  .card-head {\n    display: flex; justify-content: space-between; align-items: flex-start;\n    gap: 24px;\n    margin-bottom: 24px;\n  }\n  .card-head h3 { font-size: 18px; }\n  .card-head .meta { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; }\n  .card-head .legend { display: flex; gap: 16px; flex-wrap: wrap; }\n  .legend .dot { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.7); }\n  .legend .dot::before { content: ''; width: 10px; height: 10px; border-radius: 3px; background: var(--azul-claro); }\n  .legend .dot.gold::before { background: var(--gold); }\n  .legend .dot.coral::before { background: var(--coral); }\n  .legend .dot.verde::before { background: var(--verde); }\n  .legend .dot.line::before { width: 14px; height: 2px; border-radius: 1px; }\n\n  /* Insight box */\n  .insight {\n    margin-top: 24px;\n    padding: 18px 20px;\n    background: rgba(0,174,239,0.08);\n    border-left: 3px solid var(--azul-claro);\n    border-radius: 8px;\n    font-size: 14px;\n    color: rgba(255,255,255,0.86);\n  }\n  .insight strong { color: var(--azul-claro); font-weight: 700; }\n  .insight.gold { background: rgba(232,201,123,0.08); border-left-color: var(--gold); }\n  .insight.gold strong { color: var(--gold); }\n\n  /* Two col layout */\n  .two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 24px; }\n  .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }\n  .two-col-eq { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n\n  /* Bullets / facts list */\n  .facts { display: flex; flex-direction: column; gap: 16px; }\n  .fact {\n    display: grid;\n    grid-template-columns: 88px 1fr;\n    gap: 18px;\n    align-items: flex-start;\n  }\n  .fact .n {\n    font-size: 28px;\n    font-weight: 800;\n    color: var(--gold);\n    line-height: 1;\n    font-variant-numeric: tabular-nums;\n  }\n  .fact .t {\n    font-size: 14px;\n    color: rgba(255,255,255,0.78);\n    padding-top: 4px;\n  }\n  .fact .t strong { color: var(--branco); font-weight: 600; display: block; margin-bottom: 4px; font-size: 14px; }\n\n  /* Funnel-ish stat row */\n  .stat-row {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 0;\n    border-radius: 16px;\n    overflow: hidden;\n    background: rgba(255,255,255,0.04);\n    border: 1px solid var(--border-soft);\n  }\n  .stat-row .cell {\n    padding: 20px 24px;\n    border-right: 1px solid rgba(255,255,255,0.06);\n  }\n  .stat-row .cell:last-child { border-right: none; }\n  .stat-row .cell .l { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }\n  .stat-row .cell .v { font-size: 26px; font-weight: 700; margin-top: 8px; }\n  .stat-row .cell .s { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; }\n\n  /* Chart helpers (SVG) */\n  svg.chart text { font-family: var(--font); fill: rgba(255,255,255,0.65); font-size: 11px; }\n  svg.chart .axis { stroke: rgba(255,255,255,0.08); stroke-width: 1; }\n  svg.chart .grid { stroke: rgba(255,255,255,0.06); stroke-dasharray: 2 4; }\n  svg.chart .label-strong { fill: var(--branco); font-weight: 600; }\n\n  /* Pill list */\n  .praca-list { display: flex; flex-direction: column; gap: 14px; }\n  .praca {\n    display: grid;\n    grid-template-columns: 90px 1fr 50px;\n    gap: 16px;\n    align-items: center;\n  }\n  .praca .nm { font-size: 13px; font-weight: 600; }\n  .praca .bar { height: 10px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }\n  .praca .bar > span {\n    display: block; height: 100%;\n    background: linear-gradient(90deg, var(--azul-claro), #6cd0f6);\n    border-radius: 999px;\n  }\n  .praca .pct { font-size: 13px; font-weight: 700; text-align: right; color: var(--azul-claro); }\n\n  /* Map row (frente x papel) */\n  .map-row {\n    display: grid;\n    grid-template-columns: 200px 1fr 1.4fr;\n    gap: 24px;\n    padding: 18px 0;\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n    align-items: center;\n  }\n  .map-row:last-child { border-bottom: none; }\n  .map-row .frente {\n    font-weight: 700;\n    font-size: 14px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  .map-row .frente .ic {\n    width: 32px; height: 32px; border-radius: 8px;\n    background: rgba(0,174,239,0.15);\n    display: grid; place-items: center;\n    color: var(--azul-claro);\n    font-size: 14px; font-weight: 700;\n  }\n  .map-row .papel { color: rgba(255,255,255,0.65); font-size: 13px; }\n  .map-row .contrib { color: rgba(255,255,255,0.85); font-size: 13px; }\n  .map-row .contrib strong { color: var(--gold); }\n\n  /* Positives & Negatives */\n  .pn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }\n  .pn-card {\n    background: rgba(255,255,255,0.03);\n    border: 1px solid var(--border-soft);\n    border-radius: 22px;\n    padding: 32px;\n  }\n  .pn-card.pos { border-color: rgba(34,197,94,0.25); background: linear-gradient(180deg, rgba(34,197,94,0.05), transparent); }\n  .pn-card.neg { border-color: rgba(242,116,102,0.25); background: linear-gradient(180deg, rgba(242,116,102,0.05), transparent); }\n  .pn-card h3 { font-size: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }\n  .pn-card .badge {\n    width: 32px; height: 32px; border-radius: 50%;\n    display: grid; place-items: center;\n    font-size: 16px; font-weight: 800;\n  }\n  .pn-card.pos .badge { background: rgba(34,197,94,0.18); color: var(--verde); }\n  .pn-card.neg .badge { background: rgba(242,116,102,0.18); color: var(--coral); }\n  .pn-list { display: flex; flex-direction: column; gap: 14px; }\n  .pn-item {\n    display: grid;\n    grid-template-columns: 30px 1fr;\n    gap: 14px;\n    align-items: flex-start;\n    padding-bottom: 14px;\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n  }\n  .pn-item:last-child { border-bottom: none; padding-bottom: 0; }\n  .pn-item .idx { font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.45); padding-top: 2px; }\n  .pn-item .body { font-size: 13.5px; color: rgba(255,255,255,0.78); line-height: 1.5; }\n  .pn-item .body strong { color: var(--branco); display: block; font-size: 14px; margin-bottom: 4px; font-weight: 600; }\n\n  /* Recos */\n  .reco-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n  .reco {\n    background: rgba(255,255,255,0.03);\n    border: 1px solid var(--border-soft);\n    border-radius: 18px;\n    padding: 24px;\n  }\n  .reco h4 { color: var(--gold); font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }\n  .reco ul { list-style: none; padding: 0; }\n  .reco li {\n    font-size: 13px; color: rgba(255,255,255,0.75);\n    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);\n    padding-left: 18px; position: relative;\n  }\n  .reco li:last-child { border-bottom: none; }\n  .reco li::before {\n    content: ''; position: absolute; left: 0; top: 16px;\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--azul-claro);\n  }\n\n  /* Conclusion */\n  .conclusion {\n    background:\n      radial-gradient(800px 400px at 50% 0%, rgba(0,174,239,0.18), transparent 70%),\n      linear-gradient(180deg, #252660, #1D1E46);\n    padding: 120px 0 100px;\n    text-align: center;\n    border-bottom: none;\n  }\n  .conclusion .container { max-width: 900px; }\n  .conclusion h2 { font-size: clamp(36px, 4vw, 56px); margin: 16px 0 32px; }\n  .conclusion .big-stats {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px;\n    margin-top: 56px;\n    text-align: left;\n  }\n  .conclusion .big-stats .s {\n    background: rgba(255,255,255,0.04);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 20px;\n  }\n  .conclusion .big-stats .s .v { font-size: 24px; font-weight: 800; color: var(--gold); letter-spacing: -0.02em; }\n  .conclusion .big-stats .s .l { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px; }\n\n  /* Footer */\n  footer.foot {\n    padding: 40px 0;\n    background: #16173a;\n    text-align: center;\n  }\n  footer.foot .container { display: flex; justify-content: space-between; align-items: center; }\n  footer.foot p { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.05em; }\n\n  /* Donut center label */\n  .donut-center text { text-anchor: middle; }\n\n  /* Embarque months timeline */\n  .timeline-months {\n    display: grid;\n    grid-template-columns: repeat(9, 1fr);\n    gap: 6px;\n    margin-top: 8px;\n  }\n  .tm-cell { text-align: center; }\n  .tm-cell .nm { font-size: 11px; color: rgba(255,255,255,0.55); margin-bottom: 6px; font-weight: 600; }\n  .tm-cell .res { font-size: 13px; font-weight: 700; }\n  .tm-cell .pct { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }\n\n  /* Print */\n  @media print {\n    body { background: white; color: #1D1E46; }\n    .hero { background: linear-gradient(180deg, #1D1E46, #252660); colo
